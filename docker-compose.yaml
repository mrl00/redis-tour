services:
  redis:
    image: redis:7.2-alpine
    container_name: redis-example
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server --loglevel notice --save 60 1 --appendonly yes --appendfsync
      everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-example-ui
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
